<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GhostReply</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #dbe5f1;
      --accent: #3b82f6;
      --accent-dark: #2563eb;
      --danger: #dc2626;
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 360px;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    main {
      display: grid;
      gap: 14px;
      padding: 16px;
    }

    header {
      display: grid;
      gap: 4px;
    }

    h1 {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .panel {
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    label {
      display: grid;
      gap: 6px;
      color: #172033;
      font-size: 0.82rem;
      font-weight: 760;
    }

    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8fafc;
      color: var(--text);
      font: inherit;
      outline: none;
    }

    textarea {
      min-height: 118px;
      padding: 11px;
      resize: vertical;
      line-height: 1.45;
    }

    select {
      min-height: 38px;
      padding: 0 10px;
    }

    textarea:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      background: #ffffff;
    }

    .select-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #ffffff;
      font: inherit;
      font-weight: 820;
      cursor: pointer;
      transition: background 160ms ease, transform 160ms ease, opacity 160ms ease;
    }

    button:hover:not(:disabled) {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
    }

    .secondary {
      min-height: 34px;
      padding: 0 14px;
      background: #eaf3ff;
      color: #1d4ed8;
      font-size: 0.84rem;
    }

    .secondary:hover:not(:disabled) {
      background: #dbeafe;
    }

    .output-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .output {
      min-height: 84px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8fafc;
      color: #1e293b;
      font-size: 0.92rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .output.is-empty {
      color: var(--muted);
      font-style: italic;
    }

    .status {
      min-height: 18px;
      color: var(--danger);
      font-size: 0.82rem;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>GhostReply</h1>
      <p>Generate a quick, natural reply.</p>
    </header>

    <section class="panel" aria-label="Reply generator">
      <label>
        Message
        <textarea id="message" placeholder="Paste the message you received..."></textarea>
      </label>

      <div class="select-row">
        <label>
          Context
          <select id="context">
            <option>Text message</option>
            <option>Email</option>
            <option>Work / professional</option>
            <option>Customer / client</option>
            <option>Dating / social</option>
          </select>
        </label>

        <label>
          Tone
          <select id="tone">
            <option>Friendly</option>
            <option>Professional</option>
            <option>Assertive</option>
            <option>Confident</option>
            <option>Persuasive</option>
          </select>
        </label>

        <label>
          Intent
          <select id="intent">
            <option>Accept</option>
            <option>Decline</option>
            <option selected>Neutral</option>
          </select>
        </label>
      </div>

      <button id="generate" type="button">Generate reply</button>
      <div class="status" id="status" aria-live="polite"></div>
    </section>

    <section class="panel" aria-label="Generated reply">
      <div class="output-top">
        <p>Suggested reply</p>
        <button class="secondary" id="copy" type="button" disabled>Copy</button>
      </div>
      <div class="output is-empty" id="output">Your reply will appear here.</div>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
